<!doctype html>
<html lang="pl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Rentgen ofert — woj. śląskie</title>
  <meta name="description" content="Wszystkie oferty sprzedaży domów i mieszkań w województwie śląskim (Otodom, OLX, Gratka, Morizon, n-online) w jednym miejscu.">
  <link rel="stylesheet" href="styles.css?v=3">
</head>
<body>
  <header>
    <h1>Rentgen ofert — woj. śląskie</h1>
    <div class="sub">Domy i mieszkania na sprzedaż z pięciu portali — całe województwo śląskie w jednym miejscu, bez duplikatów.</div>
    <div class="stats" id="stats"></div>
  </header>

  <div class="controls">
    <div class="group">
      <div class="seg" data-key="type">
        <button data-val="all" class="active">Wszystko</button>
        <button data-val="house">Domy</button>
        <button data-val="flat">Mieszkania</button>
      </div>
    </div>
    <div class="group">
      <div class="seg" data-key="source" id="source-seg"></div>
    </div>
    <div class="group"><label>Miejscowość</label>
      <div class="ms" id="loc-ms">
        <button type="button" class="ms-btn" id="loc-btn">Wszystkie</button>
        <div class="ms-pop" id="loc-pop" hidden>
          <input type="search" id="loc-search" placeholder="szukaj miejscowości…" autocomplete="off">
          <div class="ms-list" id="loc-list"></div>
          <div class="ms-foot"><button type="button" id="loc-clear">wyczyść wybór</button></div>
        </div>
      </div>
    </div>
    <div class="group">
      <div class="seg" data-key="owner">
        <button data-val="all" class="active">Każdy</button>
        <button data-val="private">Prywatne</button>
        <button data-val="agency">Biura</button>
      </div>
    </div>
    <div class="group">
      <div class="seg" data-key="history">
        <button data-val="all" class="active">Wszystkie</button>
        <button data-val="relisted">Wystawione ponownie</button>
        <button data-val="dropped">Z obniżką</button>
        <button data-val="sold">Archiwum</button>
        <button data-val="sold_rcn">Sprzedane wg RCN</button>
      </div>
    </div>
    <div class="group">
      <div class="seg" data-key="market">
        <button data-val="all" class="active">Oba rynki</button>
        <button data-val="secondary">Wtórny</button>
        <button data-val="primary">Inwestycje</button>
      </div>
    </div>
    <div class="group"><label>Odległość od Gliwic (orientacyjnie)</label>
      <select id="distance">
        <option value="all">całe województwo</option>
        <option value="5">≤ 5 km</option>
        <option value="10">≤ 10 km</option>
        <option value="15">≤ 15 km</option>
        <option value="20">≤ 20 km</option>
        <option value="30">≤ 30 km</option>
        <option value="40">≤ 40 km</option>
      </select>
    </div>
    <div class="group"><label>Cena</label>
      <input class="num" id="min-price" type="number" placeholder="od" min="0" step="10000">
      <input class="num" id="max-price" type="number" placeholder="do" min="0" step="10000">
    </div>
    <div class="group"><label>m²</label>
      <input class="num" id="min-area" type="number" placeholder="od" min="0">
      <input class="num" id="max-area" type="number" placeholder="do" min="0">
    </div>
    <div class="group"><label>Pokoje od</label>
      <input class="num" id="min-rooms" type="number" placeholder="np. 2" min="0" style="width:70px">
    </div>
    <div class="group">
      <input class="txt" id="q" type="search" placeholder="szukaj: dzielnica, tytuł…">
    </div>
    <div class="spacer"></div>
    <div class="group"><label>Sortuj</label>
      <select id="sort">
        <option value="newest">Najnowsze</option>
        <option value="price_asc">Cena ↑</option>
        <option value="price_desc">Cena ↓</option>
        <option value="ppm_asc">zł/m² ↑</option>
        <option value="area_desc">Powierzchnia ↓</option>
      </select>
    </div>
    <div class="group" id="count" style="color:var(--muted);font-size:13px"></div>
  </div>

  <main>
    <div class="chips" id="chips" hidden></div>
    <div class="grid" id="grid"></div>
  </main>

  <footer>
    rentgen-ofert · dane z publicznych ogłoszeń Otodom, OLX, Gratka, Morizon i n-online · całe woj. śląskie · odświeżane automatycznie przez GitHub Actions
  </footer>

  <script src="app.js?v=13"></script>
</body>
</html>
