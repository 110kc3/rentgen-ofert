name: Update listings

on:
  schedule:
    - cron: "0 6,18 * * *"   # 06:00 and 18:00 UTC, every day
  workflow_dispatch: {}       # lets you run it manually from the Actions tab
  push:
    branches: [main]
    paths-ignore:
      - "site/data/**"        # don't re-trigger on the data commit below
      - "cache/**"            # nor on the photo-hash cache commit

permissions:
  contents: write             # commit refreshed data (price history in git)
  pages: write                # deploy to GitHub Pages
  id-token: write

concurrency:
  group: rentgen-pages
  cancel-in-progress: false

jobs:
  update-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip                                # reuse the pip download cache
          cache-dependency-path: scraper/requirements.txt

      - name: Install dependencies
        run: pip install -r scraper/requirements.txt

      - name: Scrape Śląskie listings
        env:
          RENTGEN_MAX_PAGES: "50"
          RENTGEN_DELAY: "0.7"
        run: python -m scraper.main

      - name: Commit refreshed data + photo-hash cache
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add site/data/listings.json site/data/meta.json site/data/history.json cache/phash_cache.json
          git commit -m "data: refresh Śląskie listings [skip ci]" || echo "no changes to commit"
          git push || echo "nothing to push"

      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: site
      - id: deployment
        uses: actions/deploy-pages@v4
