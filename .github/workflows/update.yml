# Scrape + commit data. Does NOT deploy — deploy.yml picks up every completed
# run (workflow_run trigger) and publishes, with retries. This keeps exactly
# one deployment path, so two workflows never race for the Pages queue.
name: Update listings

on:
  schedule:
    - cron: "0 6,18 * * *"   # 06:00 and 18:00 UTC, every day
  workflow_dispatch:          # lets you run it manually from the Actions tab
    inputs:
      rcn:
        description: "RCN snapshot: 1 = cache (weekly refresh), force = re-pull now"
        required: false
        default: "1"
  push:
    branches: [main]
    # only scraper-affecting changes trigger the heavy scrape; pure site/
    # changes are published by the lightweight deploy.yml instead
    paths:
      - "scraper/**"
      - "overrides.json"
      - ".github/workflows/update.yml"

permissions:
  contents: write             # commit refreshed data (price history in git)

concurrency:
  group: rentgen-scrape
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip                                # reuse the pip download cache
          cache-dependency-path: scraper/requirements.txt

      - name: Install dependencies
        run: pip install -r scraper/requirements.txt

      - name: Scrape Śląskie listings
        env:
          RENTGEN_MAX_PAGES: "50"
          RENTGEN_DELAY: "0.7"
          RENTGEN_RCN: ${{ github.event.inputs.rcn || '1' }}
        run: python -m scraper.main

      - name: Commit refreshed data + caches
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git pull --rebase origin main || true
          git add -A site/data cache
          git commit -m "data: refresh Śląskie listings [skip ci]" || echo "no changes to commit"
          git push || echo "nothing to push"
