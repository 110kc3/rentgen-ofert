# The ONLY workflow that touches GitHub Pages. Publishes site/ on:
#   * push changing site/**  (e.g. data scraped locally, dashboard tweaks)
#   * completion of "Update listings" (fresh CI data)
#   * manual dispatch
# The Pages queue occasionally wedges for ~10 min, so the deploy is retried
# twice with a pause; concurrency serializes deployments so they never race.
name: Deploy site

on:
  workflow_dispatch: {}
  push:
    branches: [main]
    paths: ["site/**"]
  workflow_run:
    workflows: ["Update listings"]
    types: [completed]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: rentgen-pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.final.outputs.page_url || steps.try1.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main            # workflow_run checks out the triggering sha; we want fresh main (incl. the data commit)
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: site
      - name: Deploy (attempt 1)
        id: try1
        continue-on-error: true
        uses: actions/deploy-pages@v4
        with:
          timeout: 600000      # the action's hard maximum
      - name: Wait for the Pages queue to clear
        if: steps.try1.outcome == 'failure'
        run: sleep 300
      - name: Deploy (attempt 2)
        id: final
        if: steps.try1.outcome == 'failure'
        uses: actions/deploy-pages@v4
        with:
          timeout: 600000
